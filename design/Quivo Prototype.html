<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quivo — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 700px at 50% -10%, oklch(0.95 0.03 280), transparent 60%),
      oklch(0.95 0.006 285);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
  }
  #stage {
    position: relative;
    transform-origin: center center;
  }
  #device-host {
    width: 402px;
    height: 874px;
  }
  /* mode switch chip (outside device) */
  .mode-hint {
    position: fixed;
    left: 16px;
    top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 99px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 6px 20px -6px rgba(28,25,58,0.2);
    font-size: 12px;
    font-weight: 600;
    color: #6b6880;
    z-index: 100;
    pointer-events: none;
    max-width: 220px;
  }
  .mode-hint b { color: #4b3fb0; font-weight: 700; }
</style>
</head>
<body>
  <div id="stage">
    <div id="device-host"></div>
  </div>
  <div id="tweaks-host"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/screens-child.jsx"></script>
  <script type="text/babel" src="app/screens-detail.jsx"></script>
  <script type="text/babel" src="app/screens-parent.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/tweaks.jsx"></script>

  <script type="text/babel" data-presets="react">
    function Root() {
      return (
        <IOSDevice>
          <QuivoApp />
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('device-host')).render(<Root />);
    ReactDOM.createRoot(document.getElementById('tweaks-host')).render(<QuivoTweaks />);

    function fit() {
      const pad = 40;
      const s = Math.min((window.innerWidth - pad) / 402, (window.innerHeight - pad) / 874, 1.1);
      document.getElementById('stage').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
